name: CI

on:
  push:
  pull_request:

jobs:
  check:
    name: Check Apple Silicon macOS
    runs-on: macos-14
    env:
      STEAM_BRIDGE_TARGET: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.STEAM_BRIDGE_TARGET }}
      - run: test "$(uname -m)" = "arm64"
      - run: npm ci
      - run: npm test
      - run: cargo fmt --all --check
      - run: cargo check -p steam-bridge-native --target ${{ env.STEAM_BRIDGE_TARGET }}
