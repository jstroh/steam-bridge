name: CI

on:
  push:
  pull_request:

jobs:
  check:
    name: Check ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - if: matrix.target == 'aarch64-apple-darwin'
        run: test "$(uname -m)" = arm64
      - run: node scripts/assert-supported-targets.cjs
      - run: npm ci
      - run: npm test
      - run: cargo fmt --all --check
      - run: cargo check -p steam-bridge-native --target ${{ matrix.target }}
      - run: npm run api:check

  package-smoke:
    name: Package smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run package:smoke
