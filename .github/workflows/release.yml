name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  prebuild:
    name: Prebuild ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - if: matrix.target == 'aarch64-apple-darwin'
        run: test "$(uname -m)" = arm64
      - if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y patchelf
      - run: node scripts/assert-supported-targets.cjs
      - run: npm ci
      - run: npm run build
      - run: npx napi build --release --target ${{ matrix.target }} --platform --no-js --manifest-path crates/native/Cargo.toml --package-json-path packages/steam-bridge/package.json --output-dir packages/steam-bridge
      - run: node packages/steam-bridge/scripts/link-native.cjs --runtime-only --target ${{ matrix.target }}
      - run: node scripts/verify-release-artifacts.cjs --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v6
        with:
          name: steam-bridge-${{ matrix.target }}
          path: |
            packages/steam-bridge/*.node
            packages/steam-bridge/libsteam_api.*
            packages/steam-bridge/libsdkencryptedappticket.*
            packages/steam-bridge/steam_api*.dll
            packages/steam-bridge/sdkencryptedappticket*.dll

  windows-package-gate:
    name: Windows publish-tarball ASAR gate
    needs: prebuild
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: actions/download-artifact@v8
        with:
          pattern: steam-bridge-*
          path: release-artifacts
      - run: npm ci
      - run: npm run release:assemble -- --artifacts-dir release-artifacts
      - name: Restore proved runtime payload for documentation-only v0.1.6
        if: github.event_name == 'push' && github.ref_name == 'v0.1.6'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          PREVIOUS_RELEASE_TAG: v0.1.4
        run: |
          $previousRoot = "documentation-only-previous"
          New-Item -ItemType Directory -Path $previousRoot | Out-Null
          if ((gh release view $env:PREVIOUS_RELEASE_TAG --json isDraft --jq .isDraft) -ne "false") {
            throw "Documentation-only predecessor must be a published GitHub Release."
          }
          if ((gh release view $env:PREVIOUS_RELEASE_TAG --json isPrerelease --jq .isPrerelease) -ne "false") {
            throw "Documentation-only predecessor must be stable."
          }
          gh release download $env:PREVIOUS_RELEASE_TAG `
            --pattern "steam-bridge-0.1.4.tgz" `
            --pattern "windows-live-proof-receipt.json" `
            --dir $previousRoot
          tar -xzf "$previousRoot\steam-bridge-0.1.4.tgz" -C $previousRoot
          $runtimeFiles = @(
            "steam_bridge_native.darwin-arm64.node",
            "steam_bridge_native.linux-x64-gnu.node",
            "steam_bridge_native.win32-x64-msvc.node",
            "libsteam_api.dylib",
            "libsteam_api.so",
            "steam_api64.dll",
            "libsdkencryptedappticket.dylib",
            "libsdkencryptedappticket.so",
            "sdkencryptedappticket64.dll"
          )
          foreach ($fileName in $runtimeFiles) {
            $source = Join-Path "$previousRoot\package" $fileName
            if (!(Test-Path -LiteralPath $source -PathType Leaf)) {
              throw "Documentation-only predecessor is missing $fileName."
            }
            Copy-Item -LiteralPath $source -Destination "packages\steam-bridge\$fileName" -Force
          }
      - name: Run exact Windows package gate
        run: npm run windows:package-gate
      - name: Verify canonical npm release candidate
        shell: pwsh
        run: |
          $tarballs = @(Get-ChildItem -LiteralPath "dist\windows-electron-builder-asar" -Filter "*.tgz" -File)
          if ($tarballs.Count -ne 1) {
            throw "Expected exactly one audited npm tarball, found $($tarballs.Count)."
          }
          $bundleArchives = @(Get-ChildItem -LiteralPath "dist\windows-electron-builder-asar" -Filter "*-win-unpacked.tar" -File)
          if ($bundleArchives.Count -ne 1) {
            throw "Expected exactly one retained Windows bundle archive, found $($bundleArchives.Count)."
          }
          if ("${{ github.event_name }}" -eq "push" -and "${{ github.ref_name }}" -eq "v0.1.6") {
            npm run release:publish-candidate -- `
              --tarball $tarballs[0].FullName `
              --bundle-archive $bundleArchives[0].FullName `
              --audit-manifest "dist\windows-electron-builder-asar\steam-bridge-windows-package-audit.json" `
              --previous-tarball "documentation-only-previous\steam-bridge-0.1.4.tgz" `
              --previous-live-proof-receipt "documentation-only-previous\windows-live-proof-receipt.json" `
              --previous-release-tag v0.1.4 `
              --require-publishable `
              --release-tag "${{ github.ref_name }}"
          } elseif ("${{ github.event_name }}" -eq "push") {
            npm run release:publish-candidate -- `
              --tarball $tarballs[0].FullName `
              --bundle-archive $bundleArchives[0].FullName `
              --audit-manifest "dist\windows-electron-builder-asar\steam-bridge-windows-package-audit.json" `
              --require-publishable `
              --release-tag "${{ github.ref_name }}"
          } else {
            npm run release:publish-candidate -- `
              --tarball $tarballs[0].FullName `
              --bundle-archive $bundleArchives[0].FullName `
              --audit-manifest "dist\windows-electron-builder-asar\steam-bridge-windows-package-audit.json"
          }
      - uses: actions/upload-artifact@v7
        with:
          name: steam-bridge-windows-publish-package-gate
          path: |
            dist/windows-electron-builder-asar/*.tgz
            dist/windows-electron-builder-asar/*-win-unpacked.tar
            dist/windows-electron-builder-asar/steam-bridge-windows-package-audit.json
            dist/windows-electron-builder-asar/electron-native-load-result.json
