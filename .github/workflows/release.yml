name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  prebuild:
    name: Prebuild Apple Silicon macOS
    runs-on: macos-14
    env:
      STEAM_BRIDGE_TARGET: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.STEAM_BRIDGE_TARGET }}
      - run: test "$(uname -m)" = "arm64"
      - run: npm ci
      - run: npm run build
      - run: npx napi build --release --target ${{ env.STEAM_BRIDGE_TARGET }} --platform --no-js --manifest-path crates/native/Cargo.toml --package-json-path packages/steam-bridge/package.json --output-dir packages/steam-bridge
      - run: node packages/steam-bridge/scripts/link-native.cjs --runtime-only --target ${{ env.STEAM_BRIDGE_TARGET }}
      - uses: actions/upload-artifact@v4
        with:
          name: steam-bridge-${{ env.STEAM_BRIDGE_TARGET }}
          path: |
            packages/steam-bridge/*.node
            packages/steam-bridge/libsteam_api.*
