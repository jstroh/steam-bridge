name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  prebuild:
    name: Prebuild
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: npm ci
      - run: npm run build
      - run: npx napi build --release --target ${{ matrix.target }} --platform --no-js --manifest-path crates/native/Cargo.toml --package-json-path packages/steam-bridge/package.json --output-dir packages/steam-bridge
      - run: node packages/steam-bridge/scripts/link-native.cjs --runtime-only --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: steam-bridge-${{ matrix.target }}
          path: |
            packages/steam-bridge/*.node
            packages/steam-bridge/libsteam_api.*
            packages/steam-bridge/steam_api64.dll
            packages/steam-bridge/steam_api64.lib
