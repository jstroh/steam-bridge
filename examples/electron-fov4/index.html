<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Steam Bridge Electron Smoke</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 32px;
        color: #172033;
        background: #f6f8fb;
      }

      button {
        margin: 0 8px 8px 0;
      }

      pre {
        padding: 16px;
        overflow: auto;
        background: #ffffff;
        border: 1px solid #dde3ee;
      }
    </style>
  </head>
  <body>
    <h1>Steam Bridge Electron Smoke</h1>
    <button id="id">Steam ID</button>
    <button id="deck">Steam Deck</button>
    <button id="ticket">Web API Ticket</button>
    <button id="overlay">Overlay Web Page</button>
    <pre id="output">Ready</pre>
    <script>
      const output = document.getElementById("output");
      const write = (value) => {
        output.textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2);
      };

      document.getElementById("id").onclick = async () => write(await window.steam.getSteamId());
      document.getElementById("deck").onclick = async () => write({ isSteamDeck: await window.steam.isSteamDeck() });
      document.getElementById("ticket").onclick = async () => write({ bytes: (await window.steam.getAuthTicketForWebApi()).length });
      document.getElementById("overlay").onclick = async () => window.steam.activateToWebPage("https://store.steampowered.com/");
      window.steam.onMicroTxnAuthorizationResponse((event) => write(event));
    </script>
  </body>
</html>
